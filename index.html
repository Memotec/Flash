<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Flashcard - Chế độ Xáo trộn</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-row { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: bold; transition: 0.3s; flex: 1; }
        .btn-add { background: #27ae60; }
        .btn-flash { background: #e67e22; }
        .btn-add:hover { background: #219150; }
        .btn-flash:hover { background: #d35400; }
        #list { margin-top: 30px; }
        .qa-item { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; position: relative; }
        .del-btn { position: absolute; top: 10px; right: 10px; color: red; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Tạo & Học Flashcard Ngẫu nhiên</h2>
    <div class="input-group">
        <input type="text" id="question" placeholder="Nhập câu hỏi tại đây...">
    </div>
    <div class="input-group">
        <textarea id="answer" rows="3" placeholder="Nhập câu trả lời tại đây..."></textarea>
    </div>
    <div class="btn-row">
        <button class="btn-add" onclick="addQA()">Thêm câu hỏi</button>
        <button class="btn-flash" onclick="openFlashcards()">Mở Flashcard (Ngẫu nhiên)</button>
    </div>

    <div id="list">
        <h3>Danh sách câu hỏi của bạn:</h3>
        </div>

    <script>
        let qaList = JSON.parse(localStorage.getItem('myQA')) || [];

        function renderList() {
            const list = document.getElementById('list');
            // Dọn dẹp danh sách cũ
            list.innerHTML = '<h3>Danh sách câu hỏi của bạn:</h3>'; 
            qaList.forEach((item, index) => {
                list.innerHTML += `
                    <div class="qa-item">
                        <div><strong>Q:</strong> ${item.q}</div>
                        <div><strong>A:</strong> ${item.a}</div>
                        <span class="del-btn" onclick="deleteQA(${index})">Xóa</span>
                    </div>
                `;
            });
        }

        function addQA() {
            const q = document.getElementById('question').value;
            const a = document.getElementById('answer').value;
            if (!q || !a) return alert("Vui lòng điền đủ cả Câu hỏi và Câu trả lời!");
            
            qaList.push({q, a});
            localStorage.setItem('myQA', JSON.stringify(qaList));
            document.getElementById('question').value = '';
            document.getElementById('answer').value = '';
            renderList();
        }

        function deleteQA(index) {
            qaList.splice(index, 1);
            localStorage.setItem('myQA', JSON.stringify(qaList));
            renderList();
        }

        // --- Cập nhật quan trọng: Hàm xáo trộn ---
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function openFlashcards() {
            if (qaList.length === 0) return alert("Chưa có câu hỏi nào để học! Vui lòng nhập dữ liệu.");
            const newWin = window.open("", "_blank", "width=800,height=600");

            // Tạo một bản sao và xáo trộn bản sao đó
            let shuffledData = shuffle([...qaList]); 

            newWin.document.write(`
                <html><style>
                    body { margin:0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #2c3e50; color: #fff; font-family: sans-serif; position: relative; }
                    .card { width: 85%; height: 75%; background: #fff; color: #333; border-radius: 20px; 
                            display: flex; align-items: center; justify-content: center; padding: 40px; 
                            text-align: center; cursor: pointer; box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
                            transition: transform 0.6s, background-color 0.3s, color 0.3s; transform-style: preserve-3d; font-size: 2.8rem; font-weight: bold; }
                    .card:hover { transform: scale(1.03); }
                    .hint { position: absolute; bottom: 20px; color: #bdc3c7; font-size: 1.1rem; }
                    .random-flag { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; }
                </style>
                <body>
                    <div class="random-flag">CHẾ ĐỘ NGẪU NHIÊN</div>
                    <div class="card" id="card" onclick="flip()">Câu hỏi: ${shuffledData[0].q}</div>
                    <div class="hint">Nhấp vào thẻ để lật xem đáp án | Nhấp lần nữa để sang thẻ tiếp theo</div>
                    <script>
                        let data = ${JSON.stringify(shuffledData)};
                        let idx = 0; let showQ = true;
                        function flip() {
                            const card = document.getElementById('card');
                            if(showQ) {
                                card.style.background = "#27ae60"; card.style.color = "white";
                                card.innerText = "Trả lời: " + data[idx].a;
                            } else {
                                idx = (idx + 1) % data.length;
                                card.style.background = "#fff"; card.style.color = "#333";
                                card.innerText = "Câu hỏi: " + data[idx].q;
                            }
                            showQ = !showQ;
                        }
                    <\/script>
                </body></html>
            `);
        }

        renderList(); // Hiển thị danh sách khi tải trang
    </script>
</body>
</html>
