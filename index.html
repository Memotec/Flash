<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Flashcard Google Sheets</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { width: 100%; max-width: 500px; margin: 50px auto; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .content { font-size: 1.5rem; font-weight: bold; min-height: 50px; }
    </style>
</head>
<body>
    <h2>Danh sách Flashcard</h2>
    <div id="list">Đang tải...</div>
    <button onclick="openFlashcards()">Học Ngẫu Nhiên</button>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbydFz4Xx9qUhQufeIZPhw5kslRS48A63Qe6U5ZGmoAYg7w_bELp3gQYwG7LlbExZf-Y/exec";
        let qaList = [];

        async function loadData() {
            const res = await fetch(SCRIPT_URL);
            qaList = await res.json();
            document.getElementById('list').innerHTML = `Đã tải ${qaList.length} câu.`;
        }

        function openFlashcards() {
            if (qaList.length === 0) return alert("Chưa có dữ liệu!");
            const win = window.open("", "_blank", "width=600,height=500");
            const shuffled = [...qaList].sort(() => Math.random() - 0.5);
            
            win.document.write(`
                <html><style>
                    body { display:flex; justify-content:center; align-items:center; height:100vh; background:#2c3e50; margin:0; }
                    .card { background:white; padding:40px; border-radius:15px; text-align:center; cursor:pointer; width:70%; }
                </style>
                <body>
                    <div class="card" onclick="flip()" id="c">
                        <div id="l">CÂU HỎI</div>
                        <h2 id="t">${shuffled[0].q}</h2>
                    </div>
                    <script>
                        const d = ${JSON.stringify(shuffled)}; let i=0; let showA=false;
                        function flip() {
                            showA = !showA;
                            if(showA) {
                                document.getElementById('l').innerText = "TRẢ LỜI";
                                document.getElementById('t').innerText = d[i].a;
                            } else {
                                i = (i + 1) % d.length;
                                document.getElementById('l').innerText = "CÂU HỎI";
                                document.getElementById('t').innerText = d[i].q;
                            }
                        }
                    <\/script>
                </body></html>
            `);
        }
        loadData();
    </script>
</body>
</html>
